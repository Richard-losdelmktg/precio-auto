name: Scraping Yapo (incremental)

on:
  schedule:
    - cron: '0 */6 * * *'   # cada 6 horas
  workflow_dispatch:         # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 340       # deja margen bajo el limite de 6h de GitHub
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests

      - name: Scrapear Yapo (objetivo acumulado 25000)
        run: python scripts/scraper_yapo.py 25000

      - name: Commitear datos nuevos
        run: |
          git config user.name "scraper-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/datos_scraped_yapo.json
          git diff --cached --quiet && echo "sin cambios" || git commit -m "scraper: actualiza datos Yapo [skip ci]"
          git push
