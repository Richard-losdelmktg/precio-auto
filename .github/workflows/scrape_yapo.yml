name: Scraping Yapo (incremental)

on:
  schedule:
    - cron: '0 */6 * * *'   # cada 6 horas
  workflow_dispatch:         # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write

# Evita que dos corridas (cron + manual) se solapen y choquen al hacer push
concurrency:
  group: scrape-yapo
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 330       # deja margen bajo el limite de 6h de GitHub
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests

      - name: Scrapear Yapo (objetivo acumulado 25000)
        env:
          MAX_MINUTES: '290'     # el scraper se detiene solo y guarda antes del timeout del job
        run: python scripts/scraper_yapo.py 25000

      - name: Commitear datos nuevos
        if: always()             # commitea el progreso aunque el paso anterior falle o se corte
        run: |
          git config user.name "scraper-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/datos_scraped_yapo.json data/yapo_scrape_state.json
          git diff --cached --quiet && echo "sin cambios" || git commit -m "scraper: actualiza datos Yapo [skip ci]"
          git push
